<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WomenHood — Cycle Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#2D1B30;
    --plum-deep:#1C1020;
    --cream:#FBF7F4;
    --white:#FFFFFF;
    --ink:#3A2C3D;
    --muted:#9C8A9F;
    --line:rgba(58,44,61,0.12);
    --gold:#C9A876;

    /* phase accent — swapped by JS via setTheme() */
    --accent:#FF4D6D;
    --accent-soft:#FFC2CC;
    --accent-mid:#FF8FA3;
    --bg-grad: linear-gradient(180deg, #FFC2CC 0%, #FFC2CC 18vh, #FFFFFF 70vh);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html, body{ background:var(--bg-grad); }
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.num{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ---------- AUTH SCREEN ---------- */
  .auth-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,160,160,0.15), transparent),
      linear-gradient(160deg, var(--plum) 0%, var(--plum-deep) 100%);
    position:relative;
    overflow:hidden;
  }
  .auth-wrap::before{
    content:'';
    position:absolute;
    width:600px;height:600px;
    border-radius:50%;
    border:1px solid rgba(251,247,244,0.06);
    top:-200px; right:-200px;
  }
  .auth-wrap::after{
    content:'';
    position:absolute;
    width:420px;height:420px;
    border-radius:50%;
    border:1px solid rgba(251,247,244,0.05);
    bottom:-180px; left:-160px;
  }

  .auth-card{
    width:100%;
    max-width:400px;
    background:var(--cream);
    border-radius:20px;
    padding:40px 32px 32px;
    position:relative;
    z-index:2;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.4);
    animation:rise 0.5s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:0;
  }
  .auth-card .brand{ margin-bottom:24px; justify-content:center; }
  .brand-logo{
    height:80px;
    width:auto;
    flex-shrink:0;
    display:block;
  }
  .app-header .brand-logo{ height:48px; }
  .partner-view-header .brand-logo{ height:48px; }
  .auth-logo{ height:70px !important; }
  .brand span{
    font-family:'Fraunces',serif;
    font-size:1.3rem;
    font-weight:600;
    color:var(--plum);
  }

  .auth-card h2{
    font-size:1.6rem;
    margin:0 0 6px;
    color:var(--plum);
  }
  .auth-card .sub{
    margin:0 0 26px;
    color:var(--muted);
    font-size:0.92rem;
    line-height:1.5;
  }

  .tabs{
    display:flex;
    gap:6px;
    background:rgba(58,44,61,0.06);
    border-radius:12px;
    padding:4px;
    margin-bottom:22px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 6px;
    border:none;
    background:transparent;
    border-radius:9px;
    font-size:0.82rem;
    font-weight:600;
    color:var(--muted);
    transition:all 0.2s ease;
  }
  .tab.active{
    background:var(--plum);
    color:var(--cream);
  }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:0.78rem;
    font-weight:600;
    color:var(--ink);
    margin-bottom:6px;
    letter-spacing:0.01em;
  }
  .field input, .field select{
    width:100%;
    padding:13px 14px;
    border:1.5px solid var(--line);
    border-radius:11px;
    font-size:0.95rem;
    background:#fff;
    color:var(--ink);
    transition:border-color 0.15s ease;
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--plum); }
  .field .hint{ font-size:0.74rem; color:var(--muted); margin-top:5px; }
  .field .err{ font-size:0.78rem; color:#D64550; margin-top:5px; display:none; }
  .field.invalid input{border-color:#D64550;}
  .field.invalid .err{display:block;}

  .phone-row{display:flex; gap:8px;}
  .phone-row select{
    border:1.5px solid var(--line);
    border-radius:11px;
    padding:0 8px;
    font-size:0.9rem;
    background:#fff;
    color:var(--ink);
    width:auto;
  }
  .phone-row input{flex:1;}

  .btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:11px;
    background:var(--plum);
    color:var(--cream);
    font-size:0.95rem;
    font-weight:600;
    margin-top:6px;
    transition:transform 0.12s ease, background 0.15s ease;
  }
  .btn-primary:hover{background:var(--plum-deep);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.5; cursor:not-allowed;}

  .divider{
    display:flex; align-items:center; gap:10px;
    margin:22px 0 18px; color:var(--muted); font-size:0.78rem;
  }
  .divider::before,.divider::after{ content:''; flex:1; height:1px; background:var(--line); }

  .social-row{ display:flex; gap:10px; }
  .btn-social{
    flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px; border:1.5px solid var(--line); border-radius:11px;
    background:#fff; font-size:0.85rem; font-weight:600; color:var(--ink);
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .btn-social:hover{border-color:var(--plum); background:rgba(58,44,61,0.03);}
  .btn-social svg{width:18px;height:18px;flex-shrink:0;}

  .switch-line{ text-align:center; margin-top:20px; font-size:0.85rem; color:var(--muted); }
  .switch-line button{
    background:none; border:none; color:var(--plum); font-weight:600;
    font-size:0.85rem; text-decoration:underline; padding:0;
  }

  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    background:none; border:none; color:var(--muted);
    font-size:0.83rem; font-weight:600; margin-bottom:18px; padding:0;
  }
  .back-link:hover{color:var(--plum);}

  .otp-boxes{ display:flex; gap:8px; margin-bottom:18px; }
  .otp-boxes input{
    width:100%; text-align:center; font-size:1.3rem; font-weight:700;
    padding:12px 0; letter-spacing:0;
  }

  .resend{ text-align:center; font-size:0.82rem; color:var(--muted); margin:-6px 0 18px; }
  .resend button{ background:none; border:none; color:var(--plum); font-weight:700; font-size:0.82rem; }
  .resend button:disabled{color:var(--muted); font-weight:600; cursor:default;}

  .strength{ display:flex; gap:4px; margin-top:8px; }
  .strength div{ flex:1; height:4px; border-radius:2px; background:var(--line); transition:background 0.2s ease; }

  .toast{
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--plum); color:var(--cream);
    padding:13px 22px; border-radius:11px; font-size:0.87rem; font-weight:500;
    opacity:0; pointer-events:none; transition:all 0.25s ease; z-index:999;
    box-shadow:0 12px 30px -8px rgba(0,0,0,0.4); max-width:88vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}

  /* ---------- IN-APP NOTIFICATION ---------- */
  .notif-banner{
    position:fixed; top:14px; left:50%;
    transform:translateX(-50%) translateY(-120%);
    width:min(420px, 92vw);
    background:rgba(255,255,255,0.97);
    border:1px solid var(--line); border-radius:16px; padding:14px 16px;
    display:flex; gap:12px; align-items:flex-start;
    box-shadow:0 16px 40px -12px rgba(45,27,48,0.35);
    z-index:1000;
    transition:transform 0.35s cubic-bezier(.2,.9,.3,1.2);
  }
  .notif-banner.show{transform:translateX(-50%) translateY(0);}
  .notif-icon{
    width:36px;height:36px;border-radius:50%;
    background:var(--accent-soft); color:var(--accent);
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }
  .notif-icon svg{width:18px;height:18px;}
  .notif-text .t1{font-size:0.83rem; font-weight:700; color:var(--plum); margin-bottom:2px;}
  .notif-text .t2{font-size:0.8rem; color:var(--ink); line-height:1.4;}
  .notif-close{ margin-left:auto; background:none;border:none;color:var(--muted); font-size:1.1rem; line-height:1; padding:0 2px; flex-shrink:0; }

  /* ---------- APP SCREEN ---------- */
  .app-wrap{
    display:none; min-height:100vh; flex-direction:column;
    background:var(--bg-grad); background-attachment:fixed;
    transition:background 0.6s ease;
  }
  .app-header{ display:flex; align-items:center; justify-content:space-between; padding:20px 22px 16px; }
  .app-header .brand span{color:var(--plum); font-size:1.15rem;}
  .header-actions{display:flex; align-items:center; gap:10px;}
  .signin-pill{
    background:var(--plum); color:#fff; border:none;
    padding:8px 16px; border-radius:20px; font-size:0.82rem; font-weight:700;
  }
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    border:1.5px solid var(--line); background:#fff;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
    position:relative; flex-shrink:0; padding:0; overflow:hidden;
  }
  .icon-btn svg{width:17px;height:17px;}
  .icon-btn img{width:100%;height:100%;object-fit:cover;}
  .notif-dot{
    position:absolute; top:6px; right:6px; width:8px;height:8px;border-radius:50%;
    background:var(--accent); border:1.5px solid #fff; display:none;
  }
  .notif-dot.show{display:block;}

  .app-main{ flex:1; padding:6px 22px 100px; max-width:480px; margin:0 auto; width:100%; }

  .greeting{ font-size:1.05rem; color:var(--plum); margin:8px 0 0; }
  .cycle-status-line{
    font-size:0.86rem; font-weight:700; margin:6px 0 0;
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:20px;
  }
  .cycle-status-line.status-unhealthy{ background:#FBE3E5; color:#C0414B; }
  .cycle-status-line.status-risky{ background:#FFF3E0; color:#C9821E; }
  .greeting strong{font-weight:700;}

  .ring-section{ display:flex; flex-direction:column; align-items:center; padding:18px 0 8px; }
  .ring-wrap{ position:relative; width:280px; height:280px; }
  .ring-wrap svg{width:100%; height:100%;}
  .ring-center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; width:170px;
  }
  .ring-center .phase-label{
    font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--accent); margin-bottom:4px; transition:color 0.4s ease;
  }
  .ring-center .big-num{ font-size:2.6rem; line-height:1; color:var(--plum); }
  .ring-center .big-sub{ font-size:0.8rem; color:var(--ink); margin-top:4px; }

  .legend{ display:flex; gap:14px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:0.74rem; color:var(--muted); font-weight:500; }
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .alert-card{
    margin-top:20px; background:#FFF7E8; border:1px solid #EBD3A0; border-radius:14px;
    padding:16px; display:flex; gap:12px; align-items:flex-start;
  }
  .alert-card .ai{
    width:34px;height:34px;border-radius:50%; background:var(--gold); color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .alert-card .ai svg{width:17px;height:17px;}
  .alert-card .at{font-size:0.86rem; color:#6B4E1E; font-weight:700; margin-bottom:3px;}
  .alert-card .am{font-size:0.82rem; color:#7A5A24; line-height:1.5;}
  .alert-dismiss-btn{
    background:none; border:none; color:#9C7A40; font-size:1rem;
    padding:4px 6px; cursor:pointer; flex-shrink:0; align-self:flex-start;
    border-radius:6px; line-height:1;
  }
  .alert-dismiss-btn:hover{ background:rgba(0,0,0,0.06); }

  /* Notification inbox */
  .notif-wrap{
    display:flex; flex-direction:column;
    min-height:100vh; background:var(--sky);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .notif-list{
    padding:16px 20px; display:flex; flex-direction:column; gap:10px;
  }
  .notif-item{
    background:#fff; border-radius:14px; padding:14px 12px 14px 16px;
    display:flex; align-items:flex-start; gap:10px;
    box-shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  .notif-item-body{ flex:1; }
  .notif-item-title{ font-weight:700; font-size:0.88rem; color:var(--ink); margin-bottom:3px; }
  .notif-item-text{ font-size:0.82rem; color:var(--muted); line-height:1.45; }
  .notif-item-time{ font-size:0.72rem; color:#bbb; margin-top:4px; }
  .notif-item-del{
    background:none; border:none; color:#ccc; font-size:1.1rem;
    cursor:pointer; padding:2px 4px; border-radius:6px; flex-shrink:0; line-height:1;
  }
  .notif-item-del:hover{ background:#fef0f0; color:#E57373; }
  .notif-empty{
    text-align:center; color:var(--muted); font-size:0.9rem;
    padding:60px 20px;
  }

  .checkin-card{
    margin-top:20px; background:var(--accent-soft); border:1px solid var(--accent-mid);
    border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:12px;
  }
  .checkin-card .ci-top{ display:flex; gap:12px; align-items:flex-start; }
  .checkin-card .ci-icon{
    width:36px;height:36px;border-radius:50%; background:var(--accent); color:#fff;
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }
  .checkin-card .ci-icon svg{width:18px;height:18px;}
  .checkin-card .ci-title{ font-size:0.92rem; font-weight:700; color:var(--plum); margin-bottom:2px; }
  .checkin-card .ci-body{ font-size:0.84rem; color:var(--ink); line-height:1.5; }
  .checkin-actions{ display:flex; gap:10px; }
  .checkin-btn{
    flex:1; padding:11px; border-radius:11px; font-size:0.86rem; font-weight:700; border:none;
  }
  .checkin-btn.yes{ background:var(--plum); color:#fff; }
  .checkin-btn.no{ background:#fff; color:var(--plum); border:1.5px solid var(--line); }

  .stat-cards{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:24px; }
  .stat-card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
  .stat-card .label{ font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
  .stat-card .value{ font-size:1.5rem; color:var(--plum); margin-top:4px; }

  .pad-card{
    margin-top:12px; background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .pad-card .pleft{display:flex; align-items:center; gap:12px;}
  .pad-card .picon{
    width:38px;height:38px;border-radius:11px; background:var(--accent-soft); color:var(--accent);
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }
  .pad-card .picon svg{width:19px;height:19px;}
  .pad-card .plabel{font-size:0.78rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.03em;}
  .pad-card .pval{font-size:1.3rem; color:var(--plum); margin-top:2px;}
  .pad-stepper{display:flex; align-items:center; gap:10px;}
  .pad-stepper button{
    width:30px;height:30px;border-radius:50%; border:1.5px solid var(--line); background:#fff;
    color:var(--plum); font-size:1rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .pad-low-tag{
    font-size:0.68rem; font-weight:700; color:#C0414B; background:#FBE3E5;
    padding:3px 8px; border-radius:20px; margin-top:4px; display:inline-block;
  }

  .log-row{ display:flex; gap:10px; margin-top:24px; }
  .log-btn{
    flex:1; padding:15px 10px; border:none; border-radius:14px; color:#fff;
    font-size:0.88rem; font-weight:700; display:flex; align-items:center; justify-content:center; gap:7px;
    transition:transform 0.12s ease, filter 0.15s ease;
  }
  .log-btn:hover{filter:brightness(0.93);}
  .log-btn:active{transform:scale(0.98);}
  .log-btn.start-btn{background:var(--accent);}
  .log-btn.end-btn{background:var(--plum);}

  .section-title{
    font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--muted); margin:32px 0 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .history-list{ display:flex; flex-direction:column; gap:10px; }
  .history-item{
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:13px 16px;
    width:100%; text-align:left;
  }
  .history-item .dates{font-size:0.88rem; font-weight:600; color:var(--ink);}
  .history-item .len{font-size:0.78rem; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .quality-chip{
    font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:20px;
  }
  .history-item .chev{color:var(--muted); flex-shrink:0; margin-left:8px;}
  .history-empty{
    text-align:center; padding:30px 10px; color:var(--muted); font-size:0.85rem;
    background:#fff; border:1px dashed var(--line); border-radius:12px;
  }

  /* ---- bottom nav ---- */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(255,255,255,0.96); border-top:1px solid var(--line);
    display:flex; justify-content:center; gap:40px;
    padding:10px 0 calc(10px + env(safe-area-inset-bottom)); z-index:50; backdrop-filter:blur(8px);
  }
  .nav-btn{
    background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--muted); font-size:0.66rem; font-weight:600;
  }
  .nav-btn svg{width:21px;height:21px;}
  .nav-btn.active{color:var(--accent);}

  /* ---- modal ---- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(28,16,32,0.55);
    display:none; align-items:flex-end; justify-content:center; z-index:200;
  }
  .modal-backdrop.show{display:flex;}
  .modal-sheet{
    width:100%; max-width:480px; background:var(--cream); border-radius:22px 22px 0 0;
    padding:26px 24px 30px; animation:slideup 0.3s ease both; max-height:88vh; overflow-y:auto;
  }
  @keyframes slideup{ from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal-sheet h3{color:var(--plum); margin:0 0 4px; font-size:1.25rem;}
  .modal-sheet .sub{color:var(--muted); font-size:0.85rem; margin:0 0 20px;}
  .modal-actions{display:flex; gap:10px; margin-top:8px;}
  .btn-secondary{
    flex:1; padding:13px; border-radius:11px; border:1.5px solid var(--line);
    background:#fff; color:var(--ink); font-weight:600; font-size:0.9rem;
  }
  .btn-danger{
    flex:1; padding:13px; border-radius:11px; border:1.5px solid #F0BFC3;
    background:#fff; color:#C0414B; font-weight:700; font-size:0.9rem;
  }
  .modal-actions .btn-primary{flex:1; margin-top:0;}

  /* quality picker */
  .quality-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
  .quality-opt{
    border:1.5px solid var(--line); background:#fff; border-radius:12px;
    padding:12px 10px; text-align:left; display:flex; flex-direction:column; gap:2px;
  }
  .quality-opt .qtitle{font-size:0.85rem; font-weight:700;}
  .quality-opt .qdesc{font-size:0.72rem; color:var(--muted); line-height:1.3;}
  .quality-opt.selected{border-color:currentColor; box-shadow:0 0 0 1.5px currentColor inset;}
  .q-fair{color:#3DA9FC;} .q-good{color:#3FB87F;} .q-healthy{color:#2EAA6E;}
  .q-risky{color:#E0A858;} .q-unhealthy{color:#D64550;}

  /* ---- profile page ---- */
